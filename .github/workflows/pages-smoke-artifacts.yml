# Publishes smoke + curated showcase runs to GitHub Pages (gh-pages branch):
#   /<tag>/…           — CI smoke (immutable per tag)
#   /latest/…          — same smoke, overwritten each tag push
#   /examples/find-the-bug/… — curated run (unnamed button → axe / a11y issues; overwritten each deploy)
#   /index.html        — landing
#
# Enable Pages: Settings → Pages → Deploy from branch → gh-pages / (root).
# See docs/GITHUB_PAGES.md (curl verify, stable vs moving URLs, raw HTML caveat).
name: Pages — smoke report + bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-smoke-artifacts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install
      - run: pnpm run playwright:install
      - run: pnpm build
      # LOOKOUT_MOCK_ACTIONS must apply ONLY to the showcase run. If it is set for smoke, the mock navigates straight
      # to /demo-a11y-bug (intentional axe violations) and `lookout ci` exits non-zero under `set -e`, killing the step.
      - name: Build demo, run smoke + curated showcase, stage, deploy
        run: |
          set -e
          DEMO="examples/nextjs-demo"
          SHOWCASE_MOCK='[{"kind":"navigate","url":"http://127.0.0.1:3000/demo-a11y-bug","intent":"Open intentional a11y demo"},{"kind":"complete","reason":"showcase: axe runs after navigate; expect a11y issues in the bundle"}]'
          pnpm --filter nextjs-demo build
          pnpm --filter nextjs-demo start &
          NEXT_PID=$!
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000" >/dev/null; then break; fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:3000" >/dev/null

          pnpm exec lookout ci -C "$DEMO" --config lookout.smoke.json
          SMOKE_ID=$(pnpm exec lookout runs list -C "$DEMO" --json | jq -r '.runs[0].id')

          # Showcase `lookout ci` is EXPECTED to exit non-zero (regressions + major a11y issues). We still publish
          # report + bundle for /examples/find-the-bug/. This is not masking smoke failures — smoke above must stay strict.
          set +e
          LOOKOUT_MOCK_ACTIONS="$SHOWCASE_MOCK" pnpm exec lookout ci -C "$DEMO" --config lookout.showcase.json
          set -e
          SHOWCASE_ID=$(pnpm exec lookout runs list -C "$DEMO" --json | jq -r '.runs[0].id')

          test -n "$SMOKE_ID" && test "$SMOKE_ID" != "null"
          test -n "$SHOWCASE_ID" && test "$SHOWCASE_ID" != "null"
          test -f "$DEMO/.lookout/runs/$SMOKE_ID/report.html"
          test -f "$DEMO/.lookout/runs/$SHOWCASE_ID/report.html"

          kill "$NEXT_PID" || true
          wait "$NEXT_PID" 2>/dev/null || true

          rm -rf _publish
          mkdir -p _publish
          touch _publish/.nojekyll
          cp docs/static/gh-pages-index.html _publish/index.html

          stage_run() {
            RUN_ID="$1"
            DEST="$2"
            mkdir -p "$DEST"
            cp -a "$DEMO/.lookout/runs/$RUN_ID/." "$DEST/"
            pnpm exec lookout runs export "$RUN_ID" --out "$(pwd)/$DEST/bundle.json" -C "$DEMO"
          }

          stage_run "$SHOWCASE_ID" _publish/examples/find-the-bug
          cp docs/static/find-the-bug-index.html _publish/examples/find-the-bug/index.html

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            stage_run "$SMOKE_ID" _publish/latest
          else
            TAG="${GITHUB_REF_NAME}"
            mkdir -p "_publish/$TAG" _publish/latest
            stage_run "$SMOKE_ID" "_publish/$TAG"
            cp -a "_publish/$TAG/." _publish/latest/
          fi
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_publish
          keep_files: true
